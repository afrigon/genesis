---
# Everything lives in the same physical location
timezone: America/Toronto

# ULA addressing: fd22:1337:6769:{vlan}::/64, gateway always ::1
ula_prefix: "fd22:1337:6769"

services_root: /opt

ntp_servers:
  - time.cloudflare.com
  - time.google.com

dns_resolvers:
  - 2001:4860:4860::6464
  - 2001:4860:4860::64

# polaris - internal resolver, on the core VM (services VLAN)
polaris_address: "{{ ula_prefix }}:30::3"

# Canonical internal CA root, distributed into host trust stores by common
root_ca_cert: "{{ inventory_dir }}/roles/atlas/files/root_ca.crt"

# Banner art shared by the static VyOS banner below and the colorized dynamic
# MOTD on Debian hosts (common role, update-motd.d)
login_banner_art: |2
  ▄▀▀▀ █▀▀▀ █▄  █ █▀▀▀ ▄▀▀▀ █ ▄▀▀▀    ·   ✦
  █ ▀█ █▀▀  █ ▀▄█ █▀▀   ▀▀▄ █  ▀▀▄  ✧    ·
   ▀▀▀ ▀▀▀▀ ▀   ▀ ▀▀▀▀ ▀▀▀  ▀ ▀▀▀      ✦

# Static login banner for hosts without a dynamic MOTD (vanguard)
login_banner: |2
  {{ login_banner_art }}
   host : {{ inventory_hostname }} ({{ host_description }})
   --------------------------------------------------------
   Managed by genesis (Ansible). Manual changes will be lost.