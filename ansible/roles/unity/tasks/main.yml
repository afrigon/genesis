---
- name: Create unity directory
  ansible.builtin.file:
    path: "{{ services_root }}/unity"
    state: directory
    mode: "0750"

- name: Deploy compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: "{{ services_root }}/unity/compose.yaml"
    mode: "0640"
  register: unity_compose

- name: Deploy Mongo init script
  ansible.builtin.copy:
    src: init-mongo.sh
    # mongo runs initdb scripts as uid 999, so it must be world-readable/exec
    dest: "{{ services_root }}/unity/init-mongo.sh"
    mode: "0755"

- name: Render environment file (secrets from 1Password)
  ansible.builtin.template:
    src: unity.env.j2
    dest: "{{ services_root }}/unity/.env"
    mode: "0600"
  no_log: true
  register: unity_env

- name: Deploy unity
  community.docker.docker_compose_v2:
    project_src: "{{ services_root }}/unity"
    pull: missing
    remove_orphans: true
    recreate: "{{ 'always' if (unity_compose is changed or unity_env is changed) else 'auto' }}"
