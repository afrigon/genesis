---
- name: Install UniFi OS Server prerequisites
  ansible.builtin.apt:
    name:
      - podman
      - slirp4netns
    state: present
    update_cache: true

- name: Detect an existing UniFi OS Server install
  ansible.builtin.shell: command -v uosserver
  register: unity_installed
  changed_when: false
  failed_when: false

- name: Look up the latest UniFi OS Server release
  ansible.builtin.uri:
    url: https://fw-update.ubnt.com/api/firmware-latest?filter=eq~~product~~unifi-os-server&filter=eq~~channel~~release&filter=eq~~platform~~linux-x64
    return_content: true
  register: unity_release
  when: unity_installed.rc != 0

- name: Download the UniFi OS Server installer
  ansible.builtin.get_url:
    url: "{{ (unity_release.json._embedded.firmware | first)._links.data.href }}"
    checksum: "sha256:{{ (unity_release.json._embedded.firmware | first).sha256_checksum }}"
    dest: /tmp/uosserver-installer
    mode: "0755"
  when: unity_installed.rc != 0

# One-shot bootstrap: past this point the product manages its own lifecycle
# (podman containers, systemd units, self-updates through its UI).
- name: Run the UniFi OS Server installer
  ansible.builtin.command:
    cmd: /tmp/uosserver-installer
    stdin: "y"
  when: unity_installed.rc != 0
