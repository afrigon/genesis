services:
  unity:
    image: lscr.io/linuxserver/unifi-network-application:10.4.57
    container_name: unity
    restart: unless-stopped
    depends_on:
      - unity-mongo
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - MONGO_HOST=unity-mongo
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_USER=unifi
      - MONGO_PASS=${UNITY_MONGO_PASSWORD}
      - MONGO_AUTHSOURCE=admin
    # the bare `unifi` inform name is single-label; resolving it via DNS stalls 7s, so pin it
    extra_hosts:
      - "unifi:fd22:1337:6769:30::4"
    volumes:
      - ./data:/config
    # ports for L3 (DNS) adoption
    ports:
      - "8443:8443"      # web admin / API (HTTPS)
      - "8080:8080"      # device inform
      - "3478:3478/udp"  # STUN (device keepalive)
    networks:
      - genesis

  unity-mongo:
    image: mongo:8.0
    container_name: unity-mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${UNITY_MONGO_ROOT_PASSWORD}
      - MONGO_USER=unifi
      - MONGO_PASS=${UNITY_MONGO_PASSWORD}
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
    volumes:
      - ./mongo:/data/db
      - ./init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    networks:
      - genesis

networks:
  genesis:
    external: true
