radarr:
  # instance names share one namespace across radarr and sonarr
  andromeda-radarr:
    base_url: http://andromeda-radarr:7878
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: movie
    media_naming:
      folder: jellyfin-tmdb
      movie:
        rename: true
        standard: jellyfin-tmdb
    quality_profiles:
      - name: UHD-preferred
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
      # watch-once content: cutoff sits at the bottom tier, so the first
      # decent 1080p grab satisfies it and no upgrade ever fires
      - name: HD-1080p
        upgrade:
          allowed: true
          until_quality: WEB 1080p
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
    custom_formats:
      - trash_ids:
          - 67084559197ea10b6022e2650c594866 # dual audio (asian originals)
        assign_scores_to:
          - name: UHD-preferred
            score: 150
          - name: HD-1080p
            score: 150
      # blockers and repack handling, at TRaSH default scores
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # bad dual groups
          - ed38b889b31be83fda192888e2286d83 # br-disk
          - 90a6f9a284dff5103f6346090e6280c8 # lq
          - e204b80c87be9497a8a6eaff48f72905 # lq (release title)
          - bfd8eb01832d646a0a89c4deb46f8564 # upscaled
          - 0a3f082873eb454bde444150b70253cc # extras
          - b8cd450cbfa689c0259a01d9e29ba3d6 # 3d
          - e7718d7a3ce595f289bfee26adc178f5 # repack/proper
          # DV-only releases render wrong on every non-DV client, and the
          # CPU-only transcode path can't tone-map its way out
          - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
        assign_scores_to:
          - name: UHD-preferred
          - name: HD-1080p

sonarr:
  andromeda-sonarr:
    base_url: http://andromeda-sonarr:8989
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    quality_definition:
      type: series
    media_naming:
      series: jellyfin-tvdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default
    quality_profiles:
      - name: UHD-preferred
        upgrade:
          allowed: true
          until_quality: WEB 2160p
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBDL-2160p
              - WEBRip-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
          # broadcast rips land hours before WEB releases; the cutoff
          # upgrades them away
          - name: HDTV-1080p
      # watch-once content: cutoff sits at the bottom tier, so the first
      # decent grab satisfies it and no upgrade ever fires — hence no HDTV,
      # a logo-stamped broadcast rip would be final
      - name: HD-1080p
        upgrade:
          allowed: true
          until_quality: WEB 1080p
        qualities:
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBDL-1080p
              - WEBRip-1080p
    custom_formats:
      - trash_ids:
          - ceb6ca558f4a3d47a00ebbdcb7fa7922 # dual audio (asian originals)
        assign_scores_to:
          - name: UHD-preferred
            score: 150
          - name: HD-1080p
            score: 150
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # bad dual groups
          - 85c61753df5da1fb2aab6f2a47426b09 # br-disk
          - 9c11cd3f07101cdba90a2d81cf0e56b4 # lq
          - e2315f990da2e2cbfc9fa5b7a6fcfe48 # lq (release title)
          - 23297a736ca77c0fc8e70f8edd7ee56c # upscaled
          - fbcb31d8dabd2a319072b84fc0b7249c # extras
          - ec8fa7296b64e8cd390a1600981f3923 # repack/proper
          - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
        assign_scores_to:
          - name: UHD-preferred
          - name: HD-1080p
