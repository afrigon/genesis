---
- name: Create polaris config directory
  ansible.builtin.file:
    path: "{{ services_root }}/polaris/conf"
    state: directory
    mode: "0750"

- name: Deploy compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: "{{ services_root }}/polaris/compose.yaml"
    mode: "0640"

- name: Render AdGuard Home configuration
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ services_root }}/polaris/conf/AdGuardHome.yaml"
    mode: "0640"
  register: polaris_config

- name: Disable systemd-resolved so AdGuard can bind port 53
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Deploy polaris
  community.docker.docker_compose_v2:
    project_src: "{{ services_root }}/polaris"
    pull: missing
    remove_orphans: true
    recreate: "{{ 'always' if polaris_config is changed else 'auto' }}"
