---
# Authoritative zones served by polaris-auth (knot-dns). Record names are
# relative to their zone; `@` is the apex. ACME TXT records land in the `x`
# zone dynamically via DDNS, so they're not listed here.
dns_zones:
  x:
    # - { name: '@',        AAAA: '...' }   # http(s)://x landing page, later
    - { name: vanguard,     AAAA: 'fd22:1337:6769:10::1' }
    - { name: sol,          AAAA: 'fd22:1337:6769:10::2' }
    - { name: nexus,        AAAA: 'fd22:1337:6769:10::3' }
    - { name: core.sol,     AAAA: 'fd22:1337:6769:30::3' }
    - { name: services.sol, AAAA: 'fd22:1337:6769:30::4' }
    - { name: edge.sol,     AAAA: 'fd22:1337:6769:70::2' }
    - { name: unity.sol,    AAAA: 'fd22:1337:6769:80::2' }
    # Proxy-fronted service names resolve to harmony on edge, which routes by host.
    - { name: polaris,      AAAA: 'fd22:1337:6769:70::2' }
    - { name: ca,           AAAA: 'fd22:1337:6769:70::2' }
    - { name: unity,        AAAA: 'fd22:1337:6769:70::2' }
    - { name: pioneer,      AAAA: 'fd22:1337:6769:40::100' }
  unifi:
    # http://unifi — v4-first UniFi devices need the A record
    - { name: '@',          AAAA: 'fd22:1337:6769:80::2', A: '10.0.80.2' }

# Static addresses of the two Knot containers on the `polaris` docker bridge
# (must match the ipv6_address assignments in compose.yaml).
polaris_resolver_address: 'fd23:1337:6769:2::2'
polaris_auth_address: 'fd23:1337:6769:2::3'
