http:
  routers:
    # :80 redirects everything to HTTPS, except ca.x (served plain, below) —
    # devices fetch the root over HTTP precisely because they don't trust .x yet.
    http-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: noop
      middlewares:
        - https-redirect
      priority: 1
    ca:
      rule: "Host(`ca.x`)"
      entryPoints:
        - web
      service: ca
      priority: 100

    # one router covers the account portal (janus.x) and every per-service
    # login portal (auth.{service}.x), so they share a single atlas cert
    janus:
      rule: "Host(`janus.x`) || Host(`auth.polaris.x`) || Host(`auth.tycho.x`) || Host(`auth.rosetta.x`) || Host(`auth.lyra.x`) || Host(`auth.unity.x`) || Host(`auth.gaia.x`) || Host(`auth.andromeda.x`) || Host(`auth.proxmox.sol.x`)"
      entryPoints:
        - websecure
      service: janus
      tls:
        certResolver: atlas
    tycho:
      rule: "Host(`tycho.x`)"
      entryPoints:
        - websecure
      service: tycho
      tls:
        certResolver: atlas
    polaris:
      rule: "Host(`polaris.x`)"
      entryPoints:
        - websecure
      service: polaris
      tls:
        certResolver: atlas
    unity:
      rule: "Host(`unity.x`)"
      entryPoints:
        - websecure
      service: unity
      tls:
        certResolver: atlas
    gaia:
      rule: "Host(`gaia.x`)"
      entryPoints:
        - websecure
      service: gaia
      tls:
        certResolver: atlas
    rosetta:
      rule: "Host(`rosetta.x`)"
      entryPoints:
        - websecure
      service: rosetta
      tls:
        certResolver: atlas
    lyra:
      rule: "Host(`lyra.x`)"
      entryPoints:
        - websecure
      service: lyra
      tls:
        certResolver: atlas
    andromeda:
      rule: "Host(`andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda
      tls:
        certResolver: atlas
    andromeda-seerr:
      rule: "Host(`seerr.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-seerr
      tls:
        certResolver: atlas
    andromeda-radarr:
      rule: "Host(`radarr.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-radarr
      tls:
        certResolver: atlas
    andromeda-sonarr:
      rule: "Host(`sonarr.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-sonarr
      tls:
        certResolver: atlas
    andromeda-prowlarr:
      rule: "Host(`prowlarr.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-prowlarr
      tls:
        certResolver: atlas
    andromeda-qbittorrent:
      rule: "Host(`qbittorrent.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-qbittorrent
      tls:
        certResolver: atlas
    andromeda-cleanuparr:
      rule: "Host(`cleanuparr.andromeda.x`)"
      entryPoints:
        - websecure
      service: andromeda-cleanuparr
      tls:
        certResolver: atlas
    proxmox:
      rule: "Host(`proxmox.sol.x`)"
      entryPoints:
        - websecure
      service: proxmox
      tls:
        certResolver: atlas

  services:
    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"
    janus:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:70::2]:9091"
    tycho:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:70::2]:17170"
    ca:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::3]:9001"
    polaris:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::3]:3000"
    unity:
      loadBalancer:
        servers:
          - url: "https://[fd22:1337:6769:80::2]:11443"
        serversTransport: unity-backend
    gaia:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8123"
    rosetta:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8080"
    lyra:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8095"
    andromeda:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8096"
    andromeda-seerr:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:5055"
    andromeda-radarr:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:7878"
    andromeda-sonarr:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8989"
    andromeda-prowlarr:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:9696"
    andromeda-qbittorrent:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:8090"
    andromeda-cleanuparr:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::4]:11011"
    proxmox:
      loadBalancer:
        servers:
          - url: "https://[fd22:1337:6769:10::2]:8006"
        serversTransport: proxmox-backend

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true
    janus-auth:
      forwardAuth:
        address: "http://[fd22:1337:6769:70::2]:9091/api/authz/forward-auth"
        # safe to trust: the entrypoints have no forwardedHeaders.trustedIPs,
        # so Traefik overwrites client-supplied X-Forwarded-* before this runs
        trustForwardHeader: true
        # janus only ever answers 401s and portal redirects
        maxResponseBodySize: 1048576
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name

  serversTransports:
    # UniFi serves its own self-signed cert; pin it (a self-signed leaf is its
    # own root) so the edge→dualstack hop is authenticated. The role re-pins
    # from the live endpoint on every apply — if UniFi regenerates the cert,
    # this route 502s until edge is re-applied.
    unity-backend:
      rootCAs:
        - /certs/unity.crt
      serverName: unifi.local
    # pveproxy's leaf is signed by sol's own pve-root-ca, so the pin is the CA
    # (last cert of the served chain), which survives leaf regeneration
    proxmox-backend:
      rootCAs:
        - /certs/pve-root-ca.crt
      serverName: sol

tls:
  options:
    default:
      minVersion: VersionTLS13
