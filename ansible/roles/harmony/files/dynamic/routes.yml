http:
  routers:
    # :80 redirects everything to HTTPS, except ca.x (served plain, below) —
    # devices fetch the root over HTTP precisely because they don't trust .x yet.
    http-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: noop
      middlewares:
        - https-redirect
      priority: 1
    ca:
      rule: "Host(`ca.x`)"
      entryPoints:
        - web
      service: ca
      priority: 100

    polaris:
      rule: "Host(`polaris.x`)"
      entryPoints:
        - websecure
      service: polaris
      tls:
        certResolver: atlas
    unity:
      rule: "Host(`unity.x`)"
      entryPoints:
        - websecure
      service: unity
      tls:
        certResolver: atlas

  services:
    noop:
      loadBalancer:
        servers:
          - url: "http://localhost"
    ca:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::3]:9001"
    polaris:
      loadBalancer:
        servers:
          - url: "http://[fd22:1337:6769:30::3]:3000"
    unity:
      loadBalancer:
        servers:
          - url: "https://[fd22:1337:6769:80::2]:11443"
        serversTransport: unity-backend

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

  serversTransports:
    # UniFi serves its own self-signed cert; pin it (a self-signed leaf is its
    # own root) so the edge→dualstack hop is authenticated. The role re-pins
    # from the live endpoint on every apply — if UniFi regenerates the cert,
    # this route 502s until edge is re-applied.
    unity-backend:
      rootCAs:
        - /certs/unity.crt
      serverName: unifi.local

tls:
  options:
    default:
      minVersion: VersionTLS13
