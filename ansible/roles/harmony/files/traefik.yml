entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  file:
    directory: /dynamic
    watch: true

certificatesResolvers:
  atlas:
    acme:
      caServer: https://atlas.x:9000/acme/acme/directory
      email: admin@x
      storage: /acme/acme.json
      keyType: EC256
      tlsChallenge: {}

log:
  level: INFO
