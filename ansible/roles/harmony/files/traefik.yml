entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  file:
    directory: /dynamic
    watch: true

certificatesResolvers:
  atlas:
    acme:
      # atlas lives on core, harmony on edge — reached by the VM's own name
      # (pinned to a static IP via extra_hosts) so this never routes through the
      # proxy (atlas.x would hairpin) and lego's TLS matches atlas's cert SAN.
      caServer: https://core.sol.x:9000/acme/acme/directory
      email: admin@x
      storage: /acme/acme.json
      keyType: EC256
      # atlas issues 24h certs; the default assumes ~90-day certs and checks
      # renewals only daily — zero retry margin. This checks every 10 minutes.
      certificatesDuration: 24
      dnsChallenge:
        provider: rfc2136
        # polaris-auth is internal-only; lego's propagation pre-check queries
        # public resolvers and would never see the TXT, so skip it.
        propagation:
          disableANSChecks: true

log:
  level: INFO
