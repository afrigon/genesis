services:
  harmony:
    image: traefik:v3.7.5
    container_name: harmony
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      genesis:
        # ACME challenge: atlas (on genesis) must reach harmony AT the cert's
        # domain name. Aliasing the domains here keeps that hop container-to-
        # container instead of hairpinning out to the host's published port.
        aliases:
          - polaris.x
          - unity.x
    environment:
      # Trust the atlas root so ACME (lego) accepts atlas's TLS over :9000
      - LEGO_CA_CERTIFICATES=/certs/root_ca.crt
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/dynamic:ro
      - ./certs/root_ca.crt:/certs/root_ca.crt:ro
      - ./acme:/acme

networks:
  genesis:
    external: true
