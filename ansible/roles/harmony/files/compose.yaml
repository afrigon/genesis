services:
  harmony:
    image: traefik:v3.7.5
    container_name: harmony
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      # static control-plane hop to atlas's ACME endpoint on core; the name
      # matches atlas's cert SAN so lego's TLS validates, while resolution stays
      # a fixed IP (no dependency on polaris being up to get a cert).
      - "core.sol.x:fd22:1337:6769:30::3"
    environment:
      # Trust the atlas root so ACME (lego) accepts atlas's TLS over :9000
      - LEGO_CA_CERTIFICATES=/certs/root_ca.crt
      # DNS-01 via core's Knot DDNS (RFC2136 + TSIG): lego writes the
      # _acme-challenge TXT instead of atlas connecting back to harmony.
      - RFC2136_NAMESERVER=[fd22:1337:6769:30::3]:5354
      # lego defaults to hmac-sha1; must match the knot key's algorithm
      - RFC2136_TSIG_ALGORITHM=hmac-sha256.
      - RFC2136_TSIG_KEY=acme.x.
      - RFC2136_TSIG_SECRET=${POLARIS_TSIG_SECRET}
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/dynamic:ro
      - ./certs/root_ca.crt:/certs/root_ca.crt:ro
      - ./certs/unity.crt:/certs/unity.crt:ro
      - ./acme:/acme

# compose-created networks are IPv4-only regardless of the daemon's IPv6
# settings; lego dials atlas and the DDNS endpoint on core's IPv6 ULA
networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd23:1337:6769:4::/64
