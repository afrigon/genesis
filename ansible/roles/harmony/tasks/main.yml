---
- name: Require the polaris TSIG secret (shared with lego's DNS-01 DDNS)
  ansible.builtin.assert:
    that: lookup('env', 'POLARIS_TSIG_SECRET') | length > 0
    fail_msg: "POLARIS_TSIG_SECRET is empty — run via op run --env-file=ansible/.env.op -- make ..."
    quiet: true

- name: Create harmony project directories
  ansible.builtin.file:
    path: "{{ services_root }}/harmony/{{ item }}"
    state: directory
    mode: "0750"
  loop:
    - dynamic
    - certs
    - acme

- name: Deploy compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: "{{ services_root }}/harmony/compose.yaml"
    mode: "0640"
  register: harmony_compose

- name: Render environment file (secrets from 1Password)
  ansible.builtin.template:
    src: harmony.env.j2
    dest: "{{ services_root }}/harmony/.env"
    mode: "0600"
  no_log: true
  register: harmony_env

- name: Deploy static config
  ansible.builtin.copy:
    src: traefik.yml
    dest: "{{ services_root }}/harmony/traefik.yml"
    mode: "0644"
  register: harmony_static

- name: Deploy dynamic config
  ansible.builtin.copy:
    src: dynamic/
    dest: "{{ services_root }}/harmony/dynamic/"
    mode: "0644"

- name: Trust the atlas root for ACME
  ansible.builtin.copy:
    src: "{{ root_ca_cert }}"
    dest: "{{ services_root }}/harmony/certs/root_ca.crt"
    mode: "0644"
  register: harmony_ca

- name: Fetch unity's certificate
  ansible.builtin.shell: >-
    openssl s_client -connect [fd22:1337:6769:80::2]:11443 </dev/null 2>/dev/null
    | openssl x509
  register: harmony_unity_fetch
  changed_when: false
  failed_when: false

- name: Pin unity's certificate
  ansible.builtin.copy:
    content: "{{ harmony_unity_fetch.stdout }}\n"
    dest: "{{ services_root }}/harmony/certs/unity.crt"
    mode: "0644"
  when: harmony_unity_fetch.rc == 0
  register: harmony_unity_cert

- name: Check for a pinned unity certificate
  ansible.builtin.stat:
    path: "{{ services_root }}/harmony/certs/unity.crt"
  register: harmony_unity_stat

- name: Require a pinned unity certificate
  ansible.builtin.assert:
    that: harmony_unity_stat.stat.exists
    fail_msg: "unity is unreachable and no certificate was previously pinned — bring unity up and re-apply edge"
    quiet: true

- name: Deploy harmony
  community.docker.docker_compose_v2:
    project_src: "{{ services_root }}/harmony"
    pull: missing
    remove_orphans: true
    recreate: "{{ 'always' if (harmony_static is changed or harmony_ca is changed or harmony_unity_cert is changed) else 'auto' }}"
