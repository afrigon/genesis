---
- name: Create lyra project directories
  ansible.builtin.file:
    path: "{{ services_root }}/lyra/data"
    state: directory
    mode: "0750"

- name: Deploy compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: "{{ services_root }}/lyra/compose.yaml"
    mode: "0640"

- name: Render environment file
  ansible.builtin.template:
    src: lyra.env.j2
    dest: "{{ services_root }}/lyra/.env"
    mode: "0640"

- name: Deploy lyra
  community.docker.docker_compose_v2:
    project_src: "{{ services_root }}/lyra"
    pull: missing
    remove_orphans: true
