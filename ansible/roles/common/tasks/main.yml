---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Harden SSH
  ansible.builtin.copy:
    src: sshd_hardening.conf
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t -f %s"
  notify: Restart ssh

- name: Configure DNS resolvers
  ansible.builtin.template:
    src: resolv.conf.j2
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"

- name: Set timezone
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ timezone }}"
    dest: /etc/localtime
    state: link
    force: true

- name: Persist timezone name
  ansible.builtin.copy:
    dest: /etc/timezone
    content: "{{ timezone }}\n"
    owner: root
    group: root
    mode: "0644"

- name: Install login banner
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"

- name: Trust the internal CA root
  ansible.builtin.copy:
    src: "{{ root_ca_cert }}"
    dest: /usr/local/share/ca-certificates/x-root-ca.crt
    owner: root
    group: root
    mode: "0644"
  notify: Update CA trust
