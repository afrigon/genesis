---
# Proxmox needs its hostname to resolve to the node's address; a stale
# install-time IPv4 here breaks pveproxy. Swap the address, keep the FQDN.
- name: Point the node's /etc/hosts entry at its management IPv6
  ansible.builtin.replace:
    path: /etc/hosts
    regexp: '^\S+(\s+\S*\b{{ inventory_hostname }}\b.*)$'
    replace: '{{ ansible_host }}\1'
  notify: Restart pveproxy

- name: Enable Proxmox no-subscription repository
  ansible.builtin.template:
    src: pve-no-subscription.sources.j2
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    owner: root
    group: root
    mode: "0644"

- name: Check for enterprise repositories
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/ceph.sources
  register: enterprise_repos

- name: Disable enterprise repositories
  ansible.builtin.lineinfile:
    path: "{{ item.item }}"
    regexp: '^Enabled:'
    line: "Enabled: no"
    insertafter: '^Types:'
  loop: "{{ enterprise_repos.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists

- name: Upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    autoremove: true

- name: Configure NTP
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart chrony

- name: Enable and start NTP
  ansible.builtin.service:
    name: chrony
    enabled: true
    state: started

# Terraform needs these on local storage: import for the cloud image, snippets
# for the cloud-init network/user config.
- name: Allow image import and cloud-init snippets on local storage
  ansible.builtin.command:
    cmd: pvesm set local --content vztmpl,iso,backup,snippets,import
  changed_when: false
