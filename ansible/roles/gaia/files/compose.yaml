services:
  gaia:
    image: ghcr.io/home-assistant/home-assistant:2026.7.1
    container_name: gaia
    hostname: gaia
    restart: unless-stopped
    stop_grace_period: 60s
    # host networking per upstream: discovery/multicast can't traverse a bridge
    network_mode: host
    environment:
      - TZ=${TZ}
    volumes:
      - ./config:/config
