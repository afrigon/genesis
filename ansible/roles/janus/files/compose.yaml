services:
  janus:
    image: authelia/authelia:4.39.20
    container_name: janus
    hostname: janus
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - AUTHELIA_SESSION_SECRET_FILE=/secrets/session_secret
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/secrets/storage_encryption_key
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/secrets/reset_jwt_secret
      - AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD_FILE=/secrets/ldap_password
    ports:
      - "9091:9091"
    volumes:
      - ./configuration.yml:/config/configuration.yml:ro
      - ./secrets:/secrets:ro
      - ./data:/data

# janus dials tycho's LDAP port on the VM's own ULA
networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd23:1337:6769:9::/64
