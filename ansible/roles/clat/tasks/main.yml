---
- name: Install tayga
  ansible.builtin.apt:
    name: tayga
    state: present

- name: Configure translation sysctls
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/90-clat.conf
    mode: "0644"
  register: clat_sysctl

- name: Apply translation sysctls
  ansible.builtin.command: sysctl --system
  when: clat_sysctl is changed
  changed_when: true

- name: Configure tayga
  ansible.builtin.template:
    src: tayga.conf.j2
    dest: /etc/tayga.conf
    mode: "0644"
  notify: Restart tayga

- name: Create tayga service drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/system/tayga.service.d
    state: directory
    mode: "0755"

- name: Attach CLAT network setup to the tayga service
  ansible.builtin.template:
    src: clat.conf.j2
    dest: /etc/systemd/system/tayga.service.d/clat.conf
    mode: "0644"
  notify: Restart tayga

- name: Enable tayga
  ansible.builtin.systemd_service:
    name: tayga
    enabled: true
    state: started
    daemon_reload: true
