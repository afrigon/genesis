---
- name: Require the MQTT credential and Zigbee network key
  ansible.builtin.assert:
    that:
      - lookup('env', 'ECHO_ROSETTA_PASSWORD') | length > 0
      - lookup('env', 'ROSETTA_ZIGBEE_NETWORK_KEY') | length > 0
    fail_msg: "rosetta secrets are empty — run via op run --env-file=ansible/.env.op -- make ..."
    quiet: true

- name: Create rosetta project directories
  ansible.builtin.file:
    path: "{{ services_root }}/rosetta/data"
    state: directory
    mode: "0750"

- name: Deploy compose file
  ansible.builtin.copy:
    src: compose.yaml
    dest: "{{ services_root }}/rosetta/compose.yaml"
    mode: "0640"

- name: Render environment file
  ansible.builtin.template:
    src: rosetta.env.j2
    dest: "{{ services_root }}/rosetta/.env"
    mode: "0640"

- name: Render Zigbee2MQTT configuration
  ansible.builtin.template:
    src: configuration.yaml.j2
    dest: "{{ services_root }}/rosetta/data/configuration.yaml"
    # 0600: carries the MQTT credential and the Zigbee network key
    mode: "0600"
  no_log: true
  register: rosetta_config

- name: Seed UI-owned data files
  ansible.builtin.copy:
    content: "{}\n"
    dest: "{{ services_root }}/rosetta/data/{{ item }}"
    mode: "0640"
    force: false
  loop:
    - devices.yaml
    - groups.yaml

- name: Deploy rosetta
  community.docker.docker_compose_v2:
    project_src: "{{ services_root }}/rosetta"
    pull: missing
    remove_orphans: true
    recreate: "{{ 'always' if rosetta_config is changed else 'auto' }}"
