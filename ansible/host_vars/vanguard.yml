---
host_description: Vanguard / VyOS gateway & firewall

# Physical ports
wan_interface: eth0          # WAN (modem)
wan_backup_interface: eth1   # WAN backup (5G) — not configured yet
lan_interface: eth2          # LAN trunk to the L2 switch
config_interface: eth3       # Direct connection for recovery/config

vlans:
  management: 10
  trusted: 20
  services: 30
  iot: 40
  guest: 50
  untrusted: 60
  edge: 70
  dualstack: 80

# Infrastructure VLANs: ULA advertised with no-autonomous-flag so statically
# addressed hosts don't also pick up a duplicate SLAAC ULA. (GUA still
# autoconfigures via the ::/64 wildcard.)
static_vlans:
  - management
  - services
  - edge
  - untrusted
  - dualstack

# VLANs whose clients are advertised polaris as resolver
polaris_vlans:
  - trusted
  - management
  - services
  - edge

# Prefix length requested from the ISP via DHCPv6-PD
pd_length: 56

# Vanguard's own resolvers (Cloudflare + Google). Not DNS64: Jool does not
# translate locally-originated traffic, and vanguard reaches IPv4 natively
# through the WAN anyway.
name_servers:
  - 2606:4700:4700::1111
  - 2001:4860:4860::8888

# dualstack (80) is the network's only IPv4 VLAN: UniFi gear is IPv4-first for
# adoption, and applications that still require native IPv4 live here, so every
# other VLAN stays pure IPv6. Internet-only over IPv4 (intra-VLAN L2 is how
# UniFi devices reach the controller); cross-VLAN traffic to unity is IPv6.
# .2–.99 reserved for static infra (unity); .100+ is the DHCP pool.
dualstack_ipv4:
  subnet: 10.0.80.0/24
  gateway: 10.0.80.1
  dhcp_range_start: 10.0.80.100
  dhcp_range_stop: 10.0.80.199

# iot (40) also carries IPv4: legacy devices can't do IPv6-only but still need
# iot's quarantine, not dualstack (its L2 is shared with infrastructure).
# Internet-only over NAT44; DNS to public resolvers, mirroring the RA policy.
iot_ipv4:
  subnet: 10.0.40.0/24
  gateway: 10.0.40.1
  dhcp_range_start: 10.0.40.100
  dhcp_range_stop: 10.0.40.199
  name_servers:
    - 1.1.1.1
    - 8.8.8.8
  # devices with no static-IP UI get a fixed address here (below the pool)
  # so they can carry a DNS name
  reservations:
    - { name: triton, mac: '34:8e:89:2e:23:34', ip: 10.0.40.4 }
    - { name: plant-sensor, mac: 'f0:f5:bd:f7:51:2c', ip: 10.0.40.11 }

# trusted (20) carries reservation-only IPv4: no pool, so ordinary clients
# stay pure IPv6 — a lease is an explicit per-device grant for trusted-class
# devices whose control software is IPv4-only (pyatv). No name-server option:
# these devices keep their RA-provided v6 DNS (polaris); the v4 exists so the
# CLAT can reach them, and NAT64's on-link source passes mDNS scan checks.
trusted_ipv4:
  subnet: 10.0.20.0/24
  gateway: 10.0.20.1
  reservations:
    - { name: telstar, mac: '04:4b:ed:9d:1f:5d', ip: 10.0.20.12 }

# Inter-VLAN accept rules, rendered by firewall.j2
firewall_flows:
  # management
  - { rule: 100, description: 'management reaches everything', source: management }
  - { rule: 235, description: 'proxmox API from trusted to management', source: trusted, destination: management, protocol: tcp, ports: [8006] }

  # internet egress
  - { rule: 200, description: 'trusted to internet', source: trusted, destination: wan }
  - { rule: 300, description: 'services to internet', source: services, destination: wan }
  - { rule: 400, description: 'iot to internet', source: iot, destination: wan }
  - { rule: 500, description: 'guest to internet', source: guest, destination: wan }
  - { rule: 700, description: 'edge to internet', source: edge, destination: wan }
  - { rule: 800, description: 'dualstack to internet', source: dualstack, destination: wan }

  # reverse proxy path
  - { rule: 210, description: 'trusted to edge (reverse proxy) only', source: trusted, destination: edge, protocol: tcp, ports: [80, 443] }
  - { rule: 710, description: 'edge (reverse proxy) to services backends and DNS-01', source: edge, destination: services }
  - { rule: 720, description: 'edge (reverse proxy) to unity (UniFi controller UI)', source: edge, destination: dualstack, protocol: tcp, ports: [11443] }
  - { rule: 730, description: 'edge (reverse proxy) to proxmox UI on sol', source: edge, destination: management, protocol: tcp, ports: [8006] }

  # ssh
  - { rule: 230, description: 'ssh from trusted to management', source: trusted, destination: management, protocol: tcp, ports: [22] }
  - { rule: 240, description: 'ssh from trusted to services', source: trusted, destination: services, protocol: tcp, ports: [22] }
  - { rule: 250, description: 'ssh from trusted to edge', source: trusted, destination: edge, protocol: tcp, ports: [22] }
  - { rule: 255, description: 'ssh from trusted to dualstack', source: trusted, destination: dualstack, protocol: tcp, ports: [22] }

  # dns
  - { rule: 215, description: 'DNS from trusted to polaris', source: trusted, destination: services, protocol: tcp_udp, ports: [53] }
  - { rule: 810, description: 'DNS from dualstack to polaris', source: dualstack, destination: services, protocol: tcp_udp, ports: [53] }

  # iot
  - { rule: 220, description: 'trusted to iot devices', source: trusted, destination: iot }
  - { rule: 310, description: 'services to iot devices (home assistant, zigbee)', source: services, destination: iot }
  - { rule: 410, description: 'iot to home assistant (gaia) http', source: iot, destination: services, protocol: tcp, ports: [8123] }

  # ldap
  - { rule: 320, description: 'LDAP from services to tycho (jellyfin authentication)', source: services, destination: edge, protocol: tcp, ports: [3890] }

  # casting
  - { rule: 330, description: 'services to trusted devices (gaia connects after mDNS discovery)', source: services, destination: trusted }
  # pull-based players (chromecast) fetch the audio from lyra's stream server;
  # port-scoped on purpose — AirPlay's random-port control callbacks stay
  # blocked rather than opening trusted to every backend port
  - { rule: 260, description: 'trusted players pull music assistant (lyra) streams', source: trusted, destination: services, protocol: tcp, ports: [8097] }
