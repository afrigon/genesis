---
host_description: VyOS gateway / firewall

# Physical ports
wan_interface: eth0          # WAN (modem)
wan_backup_interface: eth1   # WAN backup (5G) — not configured yet
lan_interface: eth2          # LAN trunk to the L2 switch
config_interface: eth3       # Direct connection for recovery/config

vlans:
  management: 10
  trusted: 20
  services: 30
  iot: 40
  guest: 50

# Infrastructure VLANs: ULA advertised with no-autonomous-flag so statically
# addressed hosts don't also pick up a duplicate SLAAC ULA. (GUA still
# autoconfigures via the ::/64 wildcard.)
static_vlans:
  - management
  - services

# VLANs whose clients are advertised polaris as resolver
polaris_vlans:
  - trusted
  - management
  - services

# Prefix length requested from the ISP via DHCPv6-PD
pd_length: 56

# Vanguard's own resolvers (Cloudflare + Google). Not DNS64: Jool does not
# translate locally-originated traffic, and vanguard reaches IPv4 natively
# through the WAN anyway.
name_servers:
  - 2606:4700:4700::1111
  - 2001:4860:4860::8888

# TEMPORARY IPv4 exception: the guest VLAN is dual-stacked so devices that still
# need native IPv4 (games, an IPv4-only work VPN) can hop onto x-guest; trusted
# stays pure IPv6. Internet-only — no access to internal VLANs.
# Remove once Windows CLAT ships in stable: delete this block, remove ipv4-guest
# from the template loop in roles/gateway/tasks/main.yml, delete
# roles/gateway/templates/ipv4-guest.j2, and run the manual deletes for the
# config paths the template owns.
guest_ipv4:
  subnet: 10.0.50.0/24
  gateway: 10.0.50.1
  dhcp_range_start: 10.0.50.100
  dhcp_range_stop: 10.0.50.199
